# Hauldr — production stack, deployed as a Coolify "Docker Compose" resource.
#
# Postgres (the shared core) + the control plane. Per-project GoTrue is NOT in
# here: the control plane provisions one per project on demand as a separate
# Coolify app (HAULDR_AUTH_PROVISIONER=coolify). Those apps live on the shared
# `coolify` network, so Postgres joins it too with a stable `hauldr-db` alias —
# which is what HAULDR_AUTH_DB_HOST points at.
#
# The control plane is routed at its domain via Coolify's docker_compose_domains.
#
# Multi-tenant pooling (Supavisor) is added once the basics are green — see
# docker-compose.yml for the pooler service shape. Until then the control plane
# uses direct connections (HAULDR_POOLER_API_URL unset).
services:
  hauldr-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - hauldr_pgdata:/var/lib/postgresql/data
    networks:
      default: {}
      coolify:
        aliases:
          - hauldr-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    environment:
      HAULDR_DB_ADMIN_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@hauldr-db:5432/postgres
      HAULDR_API_PORT: "8787"
      HAULDR_API_KEY: ${HAULDR_API_KEY}
      HAULDR_AUTH_PROVISIONER: coolify
      HAULDR_COOLIFY_API_URL: ${HAULDR_COOLIFY_API_URL}
      HAULDR_COOLIFY_TOKEN: ${HAULDR_COOLIFY_TOKEN}
      HAULDR_COOLIFY_PROJECT_UUID: ${HAULDR_COOLIFY_PROJECT_UUID}
      HAULDR_COOLIFY_SERVER_UUID: ${HAULDR_COOLIFY_SERVER_UUID}
      HAULDR_COOLIFY_DESTINATION_UUID: ${HAULDR_COOLIFY_DESTINATION_UUID}
      HAULDR_AUTH_DOMAIN_PATTERN: ${HAULDR_AUTH_DOMAIN_PATTERN}
      HAULDR_AUTH_DB_HOST: hauldr-db
      HAULDR_AUTH_DB_PORT: "5432"
    depends_on:
      hauldr-db:
        condition: service_healthy
    expose:
      - "8787"
    networks:
      default: {}
      coolify: {}
    restart: unless-stopped

networks:
  default: {}
  coolify:
    external: true

volumes:
  hauldr_pgdata:
