# Hauldr — production stack, deployed as a Coolify "Docker Compose" resource.
#
# Postgres (shared core) + control plane + project-zero auth (GoTrue) + panel.
# Per-project satellites (GoTrue always; PostgREST à-la-carte) are NOT here: the
# control plane provisions them per project on demand as separate Coolify apps,
# on the shared `coolify` network — which is why Postgres joins it with a stable
# `hauldr-db` alias (what HAULDR_AUTH_DB_HOST points at).
#
# The panel is routed at the control plane's domain via Coolify's
# docker_compose_domains (service: panel). The management API is published only
# on surtr's private WireGuard IP (10.10.0.2:8787) — internal services reach it
# as control-plane:8787; Heimdall reaches it across WireGuard. Never public.
#
# Multi-tenant pooling (Supavisor) is layered in once this is green.
services:
  hauldr-db:
    # Postgres + wal2json (see deploy/postgres/Dockerfile). wal2json is the
    # logical-decoding plugin Realtime's postgres-changes (postgres_cdc_rls) needs;
    # the image is byte-identical postgres:16.14-alpine plus that one plugin, so it
    # drops onto the existing data volume with no migration.
    build:
      context: ./deploy/postgres
    # Realtime needs logical decoding: postgres-changes (wal2json) and the
    # realtime.messages stream (pgoutput) both replicate from the WAL. Declared on
    # the command line so a fresh data dir comes up ready (an existing dir already
    # carries wal_level=logical in postgresql.auto.conf; re-asserting is a no-op).
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    # Shared core datastore — generous ceiling so a tenant spike can't OOM it,
    # but still bounded so a runaway can't claim the whole host.
    mem_limit: 2g
    mem_reservation: 256m
    cpus: 2.0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - hauldr_pgdata:/var/lib/postgresql/data
    networks:
      default: {}
      coolify:
        aliases:
          - hauldr-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    environment:
      HAULDR_DB_ADMIN_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@hauldr-db:5432/postgres
      HAULDR_API_PORT: "8787"
      HAULDR_API_KEY: ${HAULDR_API_KEY}
      # Per-project auth — provisioned as separate Coolify apps on surtr.
      HAULDR_AUTH_PROVISIONER: coolify
      HAULDR_COOLIFY_API_URL: ${HAULDR_COOLIFY_API_URL}
      HAULDR_COOLIFY_TOKEN: ${HAULDR_COOLIFY_TOKEN}
      HAULDR_COOLIFY_PROJECT_UUID: ${HAULDR_COOLIFY_PROJECT_UUID}
      HAULDR_COOLIFY_SERVER_UUID: ${HAULDR_COOLIFY_SERVER_UUID}
      HAULDR_COOLIFY_DESTINATION_UUID: ${HAULDR_COOLIFY_DESTINATION_UUID}
      HAULDR_AUTH_DOMAIN_PATTERN: ${HAULDR_AUTH_DOMAIN_PATTERN}
      HAULDR_AUTH_DB_HOST: hauldr-db
      HAULDR_AUTH_DB_PORT: "5432"
      # À-la-carte REST (PostgREST) — provisioned per project on demand, as
      # separate Coolify apps (same backend as auth), routed at their own domain.
      HAULDR_REST_DOMAIN_PATTERN: ${HAULDR_REST_DOMAIN_PATTERN}
      HAULDR_REST_IMAGE: ${HAULDR_REST_IMAGE:-postgrest/postgrest:v12.2.3}
      # Shared Realtime — one service for all projects; the control plane registers
      # each project as a tenant via its in-network mgmt API, and points its public
      # host (the domain pattern; tenant = the host's first label) at the edge.
      HAULDR_REALTIME_URL: ${HAULDR_REALTIME_URL:-http://realtime:4000}
      HAULDR_REALTIME_DOMAIN_PATTERN: ${HAULDR_REALTIME_DOMAIN_PATTERN}
      # Project zero — the panel's own auth (GoTrue). The control plane prepares
      # its db at bootstrap and creates the master operator once GoTrue is up.
      HAULDR_JWT_SECRET: ${HAULDR_JWT_SECRET}
      HAULDR_ZERO_DB: hauldr_zero
      HAULDR_GOTRUE_URL: http://auth:9999
      HAULDR_MASTER_EMAIL: ${HAULDR_MASTER_EMAIL}
      HAULDR_MASTER_PASSWORD: ${HAULDR_MASTER_PASSWORD}
      # Default organization (tenant zero) name for this unattended install. The
      # bootstrap creates it and adopts any existing projects into it.
      HAULDR_ORG_NAME: ${HAULDR_ORG_NAME:-My Organization}
    depends_on:
      hauldr-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8787/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    # Management API bound to a private address only (never the public internet).
    # Default localhost; set HAULDR_API_BIND_IP to a private/WireGuard IP so other
    # hosts (e.g. an orchestrator) can reach it across the private link.
    ports:
      - "${HAULDR_API_BIND_IP:-127.0.0.1}:8787:8787"
    networks:
      default: {}
      coolify: {}
    restart: unless-stopped

  # Project-zero auth. Starts after the control plane prepared hauldr_zero
  # (schema + search_path), so GoTrue migrates cleanly on first boot.
  auth:
    image: supabase/gotrue:v2.190.0
    mem_limit: 384m
    mem_reservation: 64m
    cpus: 0.5
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@hauldr-db:5432/hauldr_zero?sslmode=disable
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${HAULDR_SITE_URL:-https://hauldr.coldcodelabs.com}
      GOTRUE_API_EXTERNAL_URL: ${HAULDR_SITE_URL:-https://hauldr.coldcodelabs.com}
      API_EXTERNAL_URL: ${HAULDR_SITE_URL:-https://hauldr.coldcodelabs.com}
      GOTRUE_JWT_SECRET: ${HAULDR_JWT_SECRET}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_API_HOST: 0.0.0.0
      PORT: "9999"
    depends_on:
      control-plane:
        condition: service_healthy
    networks:
      default: {}
    restart: unless-stopped

  # Control panel (Next.js). Routed at the control plane's domain via Coolify's
  # docker_compose_domains. Talks to the control plane over the internal network
  # with the bearer key; authenticates operators against project-zero GoTrue.
  panel:
    build:
      context: ./panel
      dockerfile: Dockerfile
    mem_limit: 768m
    mem_reservation: 128m
    cpus: 1.0
    environment:
      HAULDR_API_URL: http://control-plane:8787
      HAULDR_API_KEY: ${HAULDR_API_KEY}
      HAULDR_GOTRUE_URL: http://auth:9999
      HAULDR_JWT_SECRET: ${HAULDR_JWT_SECRET}
    depends_on:
      control-plane:
        condition: service_healthy
    expose:
      - "3000"
    # Gate routing on readiness: Coolify/Traefik only attach this backend once
    # Next.js is actually serving — so a redeploy never drops traffic into a
    # still-booting container (the 504-during-deploy we hit).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      default: {}
      coolify: {}
    restart: unless-stopped

  # Multi-tenant pooler (Supavisor). Cada projeto vira um tenant, registrado pelo
  # control plane via API de gerência (porta 4000). Apps por-projeto conectam à
  # porta de dados (6543, transaction-mode p/ RLS) pelo alias coolify
  # `hauldr-pooler`. Sobe DEPOIS do control-plane (que cria o db `_supabase` no
  # bootstrap). ⚠️ coldcodelabs segue direto no hauldr-db — não passa por aqui.
  pooler:
    image: supabase/supavisor:2.9.7
    depends_on:
      hauldr-db:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    command: ["/bin/sh", "-c", "/app/bin/migrate && /app/bin/server"]
    mem_limit: 768m
    mem_reservation: 128m
    cpus: 1.0
    environment:
      PORT: "4000"
      POSTGRES_HOST: hauldr-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: _supabase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_URL: ecto://postgres:${POSTGRES_PASSWORD:-postgres}@hauldr-db:5432/_supabase
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY}
      API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      METRICS_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      CLUSTER_POSTGRES: "true"
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: hauldr
      POOLER_DEFAULT_POOL_SIZE: "10"
      POOLER_MAX_CLIENT_CONN: "100"
      POOLER_POOL_MODE: transaction
      DB_POOL_SIZE: "5"
    networks:
      default: {}
      coolify:
        aliases:
          - hauldr-pooler
    restart: unless-stopped

  # Object store S3-compatível (Garage, single-node) — o storage do data plane.
  # Um store compartilhado, um bucket por projeto. O control plane cria bucket +
  # chave S3 por projeto via API admin (porta 3903); apps falam S3 na porta 3900
  # pelo alias coolify `hauldr-garage`. Imagem fininha (build) embute o
  # garage.toml; secrets vêm das envs GARAGE_*. ⚠️ replication_factor=1 → backup
  # off-site é responsabilidade do operador (ver docs/storage.md).
  garage:
    build:
      context: ./garage
      dockerfile: Dockerfile
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      default: {}
      coolify:
        aliases:
          - hauldr-garage
    restart: unless-stopped

  # Realtime (Supabase Realtime) — o serviço de realtime do data plane:
  # broadcast / presence / postgres-changes sobre WebSocket. MULTI-TENANT por
  # design: UM serviço serve todos os projetos (≠ GoTrue/PostgREST que são por
  # projeto). O control plane registra cada projeto como "tenant" via a mgmt API
  # interna (http://realtime:4000); o tenant é resolvido pelo 1º label do host
  # público (`hauldr-realtime` alias na rede coolify roteia os domínios
  # realtime-<proj>). Migra seu próprio schema `_realtime` no boot (db criado no
  # bootstrap do control plane). ⚠️ postgres-changes exige wal_level=logical no
  # hauldr-db; broadcast/presence funcionam sem isso.
  realtime:
    image: ${HAULDR_REALTIME_IMAGE:-supabase/realtime:v2.102.3}
    depends_on:
      hauldr-db:
        condition: service_healthy
      control-plane:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    environment:
      PORT: "4000"
      DB_HOST: hauldr-db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: _realtime
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${HAULDR_REALTIME_ENC_KEY:-hauldrRealtime16}
      API_JWT_SECRET: ${HAULDR_JWT_SECRET}
      METRICS_JWT_SECRET: ${HAULDR_JWT_SECRET}
      SECRET_KEY_BASE: ${HAULDR_REALTIME_SECRET_KEY_BASE}
      APP_NAME: realtime
      SEED_SELF_HOST: "false"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
    # Public routing for the browser (WS) leg is done at the reverse proxy, NOT
    # via per-service compose labels: the tenant is resolved from the host's first
    # label, so ONE wildcard rule (realtime-<proj>.<domain>) serves every project.
    # Our Coolify/Traefik deploy uses a file-provider route — see
    # deploy/traefik/hauldr-realtime.yaml. Only projects that opted in have a DNS
    # record pointing here, so unmatched hosts never reach the service.
    networks:
      default: {}
      coolify:
        aliases:
          - hauldr-realtime
    restart: unless-stopped

networks:
  default: {}
  coolify:
    external: true

volumes:
  hauldr_pgdata:
  garage_meta:
  garage_data:
