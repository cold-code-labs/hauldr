version: 2
updates:
  # JS deps — Hauldr installs per-package, so each lockfile is its own dir.
  - package-ecosystem: "npm"
    directories:
      - "/control-plane"
      - "/panel"
      - "/packages/client"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
